<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>WebSocket Browser Test</title>
</head>
<body>
    <h1>Browser WebSocket Test</h1>
    <div id="log" style="font-family: monospace; white-space: pre-wrap; background: #eee; padding: 10px; width: 100%; height: 500px; overflow-y: scroll;"></div>
    <script>
        const logEl = document.getElementById('log');
        function log(msg) {
            logEl.textContent += msg + '\n';
        }

        const apiKey = "1d1586c71cc6bec2a9dd31aefb062e1a161ca649";
        log("Connecting to WSS...");
        const ws = new WebSocket("wss://stream.aisstream.io/v0/stream");

        ws.onopen = () => {
            log("onopen fired");
            ws.send(JSON.stringify({
                APIKey: apiKey,
                BoundingBoxes: [[[-90, -180], [90, 180]]],
                FilterMessageTypes: ["PositionReport"]
            }));
            log("sent payload");
        };

        ws.onmessage = (event) => {
            log("onmessage: " + event.data.substring(0, 100));
        };

        ws.onclose = (e) => {
            log("onclose: " + e.code + " " + e.reason);
        };

        ws.onerror = (e) => {
            log("onerror");
        };
    </script>
</body>
</html>
